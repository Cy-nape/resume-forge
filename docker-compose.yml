version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent host node_modules from overriding container's
    environment:
      - PORT=3001
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=supersecret123
      # Add GEMINI_API_KEY to a local .env file instead of committing it here
    env_file:
      - ./backend/.env
